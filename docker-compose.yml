# English Learning platform — infrastructure skeleton.
# Target: Docker on a home Mac Mini (Apple Silicon / arm64).
# Goal of this file: every service builds and comes up healthy BEFORE any
# business logic exists. Real logic grows on top of these containers later.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-english_learning}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-english_learning}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      API_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-english_learning}
      AUDIO_DIR: /data/audio
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-1}
    volumes:
      - audio:/data/audio
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-english_learning}
      AUDIO_DIR: /data/audio
      WORKER_HEARTBEAT_MS: 5000
    volumes:
      - audio:/data/audio
    depends_on:
      db:
        condition: service_healthy

  web-admin:
    build:
      context: .
      dockerfile: web-admin/Dockerfile
    ports:
      - "${WEB_ADMIN_PORT:-8081}:80"

  web-learner:
    build:
      context: .
      dockerfile: web-learner/Dockerfile
    ports:
      - "${WEB_LEARNER_PORT:-8082}:80"

volumes:
  pgdata:
  audio:
