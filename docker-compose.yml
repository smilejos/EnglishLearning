# English Learning platform — full assembly.
# Target: Docker on a home Mac Mini (Apple Silicon / arm64).
# db → migrate（一次性建表）→ api / worker（共用 audio volume）→ 兩個前端 nginx。

# api 與 worker 共用的 Gemini / auth 環境（dev 預設可直接起，正式以 .env 覆寫）。
x-app-env: &app-env
  GEMINI_API_KEY: ${GEMINI_API_KEY:-dev-placeholder}
  GEMINI_TTS_MODEL: ${GEMINI_TTS_MODEL:-gemini-2.5-flash-preview-tts}
  GEMINI_TRANSLATE_MODEL: ${GEMINI_TRANSLATE_MODEL:-gemini-2.5-flash}
  GEMINI_EXPLAIN_MODEL: ${GEMINI_EXPLAIN_MODEL:-gemini-2.5-flash}
  GEMINI_TTS_VOICE_EN: ${GEMINI_TTS_VOICE_EN:-Kore}
  GEMINI_TTS_VOICE_ZH: ${GEMINI_TTS_VOICE_ZH:-Kore}
  CF_ACCESS_TEAM_DOMAIN: ${CF_ACCESS_TEAM_DOMAIN:-}
  CF_ACCESS_AUD: ${CF_ACCESS_AUD:-}
  ADMIN_EMAILS: ${ADMIN_EMAILS:-}
  DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-1}
  DEV_USER_EMAIL: ${DEV_USER_EMAIL:-dev@example.com}
  LOOKUP_USER_PER_MIN: ${LOOKUP_USER_PER_MIN:-10}
  LOOKUP_GLOBAL_PER_DAY: ${LOOKUP_GLOBAL_PER_DAY:-200}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-english_learning}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-english_learning}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 一次性執行 migration，完成即退出。
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-english_learning}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      <<: *app-env
      API_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-english_learning}
      AUDIO_DIR: /data/audio
    volumes:
      - audio:/data/audio
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      <<: *app-env
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-english_learning}
      AUDIO_DIR: /data/audio
      WORKER_POLL_MS: 3000
    volumes:
      - audio:/data/audio
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web-admin:
    build:
      context: .
      dockerfile: web-admin/Dockerfile
    ports:
      - "${WEB_ADMIN_PORT:-8081}:80"
    depends_on:
      api:
        condition: service_healthy

  web-learner:
    build:
      context: .
      dockerfile: web-learner/Dockerfile
    ports:
      - "${WEB_LEARNER_PORT:-8082}:80"
    depends_on:
      api:
        condition: service_healthy

  # 一次性示範資料匯入（免 LLM，從 fixtures 還原翻譯與音檔）。
  # 僅在指定 profile 時啟用：`docker compose --profile seed run --rm seed`（見 npm run seed）。
  seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: Dockerfile.seed
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-english_learning}
      AUDIO_DIR: /data/audio
    volumes:
      - audio:/data/audio
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  pgdata:
  audio:
