# 對外單一入口 reverse proxy：一個網域（e-learning.jos.homes）用路徑分流。
#   /admin/*  → web-admin（後台 SPA，以 /admin/ 為 base 打包）
#   API 路徑  → api（集中轉發，兩個 SPA 同源呼叫）
#   其餘      → web-learner（前台 SPA）
# Cloudflare Tunnel 的 public hostname 指到本服務（http://proxy:80）。
server {
  listen 80;
  server_name _;

  # 用 Docker 內建 DNS 每 10 秒重新解析上游 IP，避免容器重啟換 IP 後
  # nginx 抱著啟動時快取的舊 IP 而回 502。搭配變數 proxy_pass 才會在
  # 執行期解析（靜態 proxy_pass 只在啟動時解析一次）。
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $api api;
  set $admin web-admin;
  set $learner web-learner;

  proxy_set_header Host $http_host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # ---- API：集中轉給 api 服務 ----
  location /articles   { proxy_pass http://$api:8080; }
  location /words      { proxy_pass http://$api:8080; }
  location /lookups    { proxy_pass http://$api:8080; }
  location /categories { proxy_pass http://$api:8080; }
  location /tags       { proxy_pass http://$api:8080; }
  location /tag-kinds  { proxy_pass http://$api:8080; }
  location /stats      { proxy_pass http://$api:8080; }
  location /audio      { proxy_pass http://$api:8080; }
  location /healthz    { proxy_pass http://$api:8080; }
  location /users      { proxy_pass http://$api:8080; }
  location /me         { proxy_pass http://$api:8080; }

  # ---- 後台 SPA（保留 /admin 前綴，由 web-admin nginx 處理）----
  location /admin { proxy_pass http://$admin:80; }

  # ---- 前台 SPA（其餘全部）----
  location / { proxy_pass http://$learner:80; }
}
